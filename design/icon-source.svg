<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c6cff"/>
      <stop offset="0.55" stop-color="#6d5efc"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="play" x1="220" y1="196" x2="316" y2="316" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d5efc"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (maskable safe) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Ghost slide cards behind, implying a deck / PPT -->
  <rect x="150" y="150" width="212" height="150" rx="20"
        transform="rotate(-9 256 256)" fill="#ffffff" fill-opacity="0.22"/>
  <rect x="150" y="150" width="212" height="150" rx="20"
        transform="rotate(-4 256 256)" fill="#ffffff" fill-opacity="0.4"/>

  <!-- Front slide card -->
  <rect x="146" y="150" width="220" height="212" rx="26" fill="#ffffff"/>

  <!-- Play triangle -->
  <path d="M234 208 L300 256 L234 304 Z" fill="url(#play)" stroke="url(#play)"
        stroke-width="18" stroke-linejoin="round"/>
</svg>
